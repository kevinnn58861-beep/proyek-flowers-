<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas Grow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <p class="title">Flores Amarillas para el amor de mi vida:</p>
        
        <div class="tree-svg">
            <svg viewBox="0 0 200 200">
                <rect x="95" y="150" width="10" height="40" fill="#5d4037" />
                
                <circle class="flower" cx="100" cy="110" r="8" fill="#ffeb3b" />
                <circle class="flower" cx="80" cy="120" r="10" fill="#fdd835" />
                <circle class="flower" cx="120" cy="120" r="9" fill="#fbc02d" />
                <circle class="flower" cx="100" cy="80" r="12" fill="#ffeb3b" />
                <circle class="flower" cx="70" cy="100" r="8" fill="#fdd835" />
                <circle class="flower" cx="130" cy="100" r="11" fill="#fbc02d" />
                <circle class="flower" cx="90" cy="60" r="7" fill="#ffeb3b" />
                <circle class="flower" cx="110" cy="60" r="9" fill="#fdd835" />
                <circle class="flower" cx="100" cy="130" r="10" fill="#fbc02d" />
                </svg>
        </div>

        <p class="subtitle">Mi amor por ti comenzó hace...</p>
        <div class="timer">
            <span id="days">0</span> días 
            <span id="hours">0</span> horas 
            <span id="minutes">0</span> min 
            <span id="seconds">0</span> seg
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
